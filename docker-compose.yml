services:
  db:
    # Official pgvector image, bundling PostgreSQL 17 (latest stable) + the vector extension.
    image: pgvector/pgvector:pg17
    container_name: documind-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: documind
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      # Host 5433 -> container 5432 (host 5432 is used by a native PostgreSQL install).
      - "5433:5432"
    volumes:
      # Persist data across container restarts / recreates.
      - documind-db-data:/var/lib/postgresql/data
      # Init scripts run only on FIRST container creation (empty data dir).
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d documind"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  documind-db-data:
